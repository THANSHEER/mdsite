name: Release

# Fires when you push a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Publishes: npm package, standalone binaries (GitHub Release assets), a Docker
# image (ghcr.io), and an updated Homebrew formula in the tap repo.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets
  packages: write # push the Docker image to ghcr.io

jobs:
  # 1) npm — the canonical channel (CLI + npx + library). Needs the NPM_TOKEN secret.
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 2) Standalone binaries via Node SEA — one job per OS/arch (SEA can't cross-compile).
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: darwin-arm64, ext: tar.gz }
          - { os: macos-13, target: darwin-x64, ext: tar.gz }
          - { os: ubuntu-latest, target: linux-x64, ext: tar.gz }
          - { os: ubuntu-24.04-arm, target: linux-arm64, ext: tar.gz } # GitHub-hosted arm64 runner
          - { os: windows-2022, target: win-x64, ext: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # actions/setup-node provides an official, SEA-capable Node
      - run: npm ci --ignore-scripts
      - run: npm run build:binary
      - name: Package (unix)
        if: matrix.ext == 'tar.gz'
        run: tar -czf mdgarden-${{ matrix.target }}.tar.gz -C build mdgarden
      - name: Package (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path build/mdgarden.exe -DestinationPath mdgarden-${{ matrix.target }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: mdgarden-${{ matrix.target }}.${{ matrix.ext }}

  # 3) Docker image (multi-arch) to ghcr.io. Uses the built-in GITHUB_TOKEN.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mdgarden
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 4) Homebrew — refresh the tap formula's version + sha256 from the release assets.
  #    Needs a TAP_REPO_TOKEN secret (PAT with write access to THANSHEER/homebrew-tap).
  homebrew:
    needs: [binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/release
          for t in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            gh release download "${GITHUB_REF_NAME}" -p "mdgarden-$t.tar.gz" -D build/release
          done
      - run: node scripts/update-formula.mjs build/release
      - name: Commit formula to tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/THANSHEER/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp packaging/homebrew/mdgarden.rb tap/Formula/mdgarden.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mdgarden.rb
          git commit -m "mdgarden ${GITHUB_REF_NAME}" || { echo "no changes"; exit 0; }
          git branch -M main          # works for a brand-new empty tap repo too
          git push -u origin main
