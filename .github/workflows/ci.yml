name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['lts/-1', 'lts/*', 'latest']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # --ignore-scripts skips the `prepare` build; we run it explicitly below.
      # esbuild's platform binary is an optionalDependency, so it still installs.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run build
      - name: Unit + integration tests (with coverage)
        run: npm run test:coverage
      - name: Smoke test (build the fixtures via the packaged CLI)
        run: |
          node dist/cli.js build test/fixtures -o /tmp/out
          test -f /tmp/out/index.html
          test -f /tmp/out/mdgarden.client.js
          test -f /tmp/out/katex/katex.min.css
      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
